version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: omnireserve-mysql
    environment:
      MYSQL_ROOT_PASSWORD: irfan
      MYSQL_DATABASE: omnireserve_vs
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: omnireserve-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/omnireserve_vs
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: irfan